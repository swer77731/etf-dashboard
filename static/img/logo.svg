<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="trend-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5"
            markerWidth="4.5" markerHeight="4.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- 外圈觀察鏡 -->
  <circle cx="32" cy="32" r="27" stroke="url(#ring-grad)" stroke-width="2.5"/>

  <!-- 內圈雷達定位 (虛線,科技感) -->
  <circle cx="32" cy="32" r="20" stroke="#3b82f6" stroke-width="0.6"
          stroke-opacity="0.35" stroke-dasharray="2.5 2.5"/>

  <!-- 階梯 K 棒(三根遞增,代表趨勢數據) -->
  <rect x="19" y="36" width="4" height="11" rx="1" fill="#3b82f6" fill-opacity="0.35"/>
  <rect x="27" y="29" width="4" height="18" rx="1" fill="#3b82f6" fill-opacity="0.60"/>
  <rect x="35" y="21" width="4" height="26" rx="1" fill="#3b82f6" fill-opacity="0.85"/>

  <!-- 主視覺:上升趨勢線 + 箭頭 -->
  <path d="M 17 40 L 29 28 L 39 20 L 46 13"
        stroke="url(#trend-grad)" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrow)"/>

  <!-- 中心視點 (target 小圓點) -->
  <circle cx="32" cy="32" r="1.5" fill="#3b82f6" fill-opacity="0.5"/>
</svg>
